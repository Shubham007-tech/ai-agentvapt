server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect bare root to subpath
    location = / {
        return 301 /vapt_iaura_services/;
    }

    location /vapt_iaura_services/ {
        # No-cache for config.js so runtime vars are always fresh
        location ~* /vapt_iaura_services/config\.js$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires -1;
        }

        # SPA fallback — all unknown routes serve index.html
        try_files $uri $uri/ /vapt_iaura_services/index.html;
    }
}
