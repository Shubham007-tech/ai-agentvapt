name: Deploy Prod

on:
  push:
    branches:
      - master

env:
  AWS_REGION: eu-north-1                         # change to your region
  ECR_REPOSITORY: agent-mgmt-app

jobs:
  deploy:
    name: Build & Push & Update Manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}           # needs write access to push manifest update

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to ECR
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: prod-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./agent_mgmt_app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update image tag in prod overlay
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.build.outputs.tag }}
        run: |
          cd agent_mgmt_app/k8s/overlays/prod
          kustomize edit set image agent-mgmt-app=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Commit and push manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agent_mgmt_app/k8s/overlays/prod/kustomization.yaml
          git commit -m "ci(prod): update image to prod-${{ github.sha }}"
          git push origin master
