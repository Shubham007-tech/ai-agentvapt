apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-mgmt-app-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Shubham007-tech/ai-agentvapt.git
    targetRevision: master                           # watches the master branch
    path: agent_mgmt_app/k8s/overlays/prod

  destination:
    server: https://kubernetes.default.svc          # same cluster where ArgoCD runs
    namespace: production

  syncPolicy:
    automated:
      prune: true        # removes resources deleted from Git
      selfHeal: true     # reverts any manual kubectl changes
    syncOptions:
      - CreateNamespace=true   # creates production namespace if missing
