apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agent-mgmt-app-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Shubham007-tech/ai-agentvapt.git
    targetRevision: dev                              # watches the dev branch
    path: agent_mgmt_app/k8s/overlays/dev

  destination:
    server: https://kubernetes.default.svc          # same cluster where ArgoCD runs
    namespace: development

  syncPolicy:
    automated:
      prune: true        # removes resources deleted from Git
      selfHeal: true     # reverts any manual kubectl changes
    syncOptions:
      - CreateNamespace=true   # creates development namespace if missing
